# CI for go-gitpack.
#
# Three gates run on every push/PR:
#   - test        default pure-Go flate backend, full suite
#   - race        the same suite under the data-race detector (guards the
#                 concurrent read path and the parallel commit walk)
#   - libdeflate  the cgo libdeflate backend, which a plain `go test` never
#                 compiles (it is gated behind the gitpack_libdeflate build
#                 tag), so it would otherwise ship untested
#
# Each job delegates to the Makefile targets (make build/vet/fmt-check/test/...)
# so CI and local `make check` cannot drift. The test targets depend on `make
# fixtures`, which runs ./generate_testdata.sh to build the gitignored
# testdata/repos fixtures on a fresh runner.
#
# go.mod pins the compress fork commit that provides the bytes.Reader flate
# fast path, so CI and local builds resolve the same immutable source.

name: CI

on:
  push:
  pull_request:

# Cancel superseded runs for the same ref so a burst of pushes does not keep
# stale jobs occupying runners.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (pure-Go)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gitpack
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-gitpack/go.mod
      - name: fmt-check, vet, build, test
        working-directory: go-gitpack
        run: |
          make fmt-check
          make vet
          make build
          make test

  race:
    name: race detector
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gitpack
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-gitpack/go.mod
      - name: test -race
        working-directory: go-gitpack
        run: make test-race

  libdeflate:
    name: cgo libdeflate backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gitpack
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-gitpack/go.mod
      - name: install libdeflate
        run: sudo apt-get update && sudo apt-get install -y libdeflate-dev
      - name: test -tags gitpack_libdeflate
        working-directory: go-gitpack
        run: make test-libdeflate
