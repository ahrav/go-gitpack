# CI for go-gitpack.
#
# Three gates run on every push/PR:
#   - test        default pure-Go flate backend, full suite
#   - race        the same suite under the data-race detector (guards the
#                 concurrent read path and the parallel commit walk)
#   - libdeflate  the cgo libdeflate backend, which a plain `go test` never
#                 compiles (it is gated behind the gitpack_libdeflate build
#                 tag), so it would otherwise ship untested
#
# NOTE ON THE MODULE REPLACE: go.mod replaces github.com/klauspost/compress with
# the sibling directory ../klauspost-compress (a perf fork that adds the
# bytes.Reader flate fast path). Each job therefore checks out this repo AND the
# fork side-by-side under the workspace so the relative `replace` resolves, then
# runs go from the repo checkout via `working-directory`.

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gitpack
      - uses: actions/checkout@v4
        with:
          repository: ahrav/compress
          ref: go-gitpack-autoresearch
          path: klauspost-compress
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-gitpack/go.mod
      - name: build
        working-directory: go-gitpack
        run: go build ./...
      - name: vet
        working-directory: go-gitpack
        run: go vet ./...
      - name: gofmt
        working-directory: go-gitpack
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt needed:"; echo "$out"; exit 1; fi
      - name: test
        working-directory: go-gitpack
        run: go test -count=1 ./...

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gitpack
      - uses: actions/checkout@v4
        with:
          repository: ahrav/compress
          ref: go-gitpack-autoresearch
          path: klauspost-compress
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-gitpack/go.mod
      - name: test -race
        working-directory: go-gitpack
        run: go test -race -count=1 ./...

  libdeflate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gitpack
      - uses: actions/checkout@v4
        with:
          repository: ahrav/compress
          ref: go-gitpack-autoresearch
          path: klauspost-compress
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-gitpack/go.mod
      - name: install libdeflate
        run: sudo apt-get update && sudo apt-get install -y libdeflate-dev
      - name: test -tags gitpack_libdeflate
        working-directory: go-gitpack
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: "-ldeflate"
        run: go test -tags gitpack_libdeflate -count=1 ./...
